{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}


{% block content %}
<div class="container mt-5">
    <h2>User Profile</h2>
    <form action="" method="post" enctype="multipart/form-data" >
        {% csrf_token %}
        {{form |crispy}}
        <button type="submit" class="btn btn-primary">Update Profile</button>
    </form>
</div>
{% endblock %}
