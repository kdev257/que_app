{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<body>    
    <div class="container">
    <div class="row">
        <div class="col-sm-10 offset-sm-1"><br><br><br>
            <center><h2 class="text-success">Login</h2></center>
            <form method="post" action="{% url 'user_login' %}">
                {% csrf_token %}
                {{ form |crispy }} 
                {% if form.non_field_errors %}
                    <div class="alert alert-danger">
                        {{ form.non_field_errors }}
                    </div>
                {% endif %} <br>
               <center><button type="submit" class="btn btn-success" style="width: 500px;height: 70px;border: 1px solid #ccc;border-radius: 20px;">Login</button></center> <br>
               <center> <div> New to Quick-Saas? <button class="btn btn-success height:50px"><a class="text-warning" href="{% url 'register' %}">Register here</a></button>
                Forgot password? <button class="btn btn-success"><a class="text-warning" href="#">Reset here</a></button></div></center>
                
            </form>
        </div>
    </div>
</div>
</body>


{% endblock %}
