{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6 offset-md-3"><br><br><br>
            <center><h2 class="text-success">Sign Up</h2></center>
            <form method="post" action="{% url 'register' %}" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form |crispy }}<br><br>
                <button type="submit" class="btn btn-primary">Register</button> <span   class="ml-2">   Already have an account? <button class="btn btn-primary"><a class="text-warning" href="{% url 'user_login' %}">Login here</a></button>
                </span>
            </form>
        </div>
    </div>
{% endblock %}
