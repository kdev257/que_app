{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="container">
    <div class="row align-items-center min-vh-75 py-3">
        
        <div class="col-lg-6 col-md-12 text-start order-1">
            <h1 class="display-3 fw-bold mb-3">
                Smart queue management <br>
                <span class="text-primary">for modern businesses.</span>
            </h1>
            <p class="lead text-muted mb-4 pe-lg-5" style="max-width: 500px;">
            Eliminate physical lines and improve customer experience with our cloud-based queueing system.
            </p>
            <div class="d-grid d-md-flex justify-content-md-start gap-3">
                <a href="{% url 'register' %}" class="btn btn-primary btn-lg px-5 py-3 shadow">Get Started Free</a>
                <a href="#features" class="btn btn-outline-secondary btn-lg px-5 py-3">Learn More</a>
            </div>
        </div>

        <div class="col-lg-6 col-md-12 text-center order-2 mt-5 mt-lg-0">
            <div class="position-relative d-inline-block">
                <img src="{% static 'queLogo.png' %}" 
                class="img-fluid rounded-4 shadow-sm border" 
                style="background: white; padding: 20px; height:75vh;">
                
                <div class="position-absolute top-50 start-50 translate-middle bg-primary opacity-10 rounded-circle" 
                     style="width: 120%; height: 120%; z-index: -1;"></div>
            </div>
        </div>

    </div>
</section>
{% endblock %}
