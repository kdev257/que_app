{% extends "base.html" %}

{% block content %}

<div class="container-fluid">
    <div class="row">

<!-- Sidebar -->
        <div class="col-md-3 bg-light">

            <h4 class="mt-3">Service Categories</h4>

                <ul class="list-group">

                    {% for category in categories %}

                        <li class="list-group-item">
                            <a href="{% url 'customer_dashboard'  %}">
                               <a href="{% url 'services_list' category.id %}">{{ category.name }}</a>
                            </a>
                        </li>

                    {% endfor %}

                </ul>

        </div>


            <!-- Main Content -->
        <div class="col-md-9">

            <h3 class="mt-3">Select a service category</h3>
            <p>Choose a category from the left sidebar to see providers.</p>

        </div>


</div>
</div>

{% endblock %}
